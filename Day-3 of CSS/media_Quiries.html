<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Login Form & Cards</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
            padding:40px 20px;
        }

        .login-form{
            width:400px;
            margin:0 auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            text-align:center;
        }

        .login-form h1{
            margin-bottom:20px;
            font-size:32px;
        }

        .login-form input{
            width:350px;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        .login-form button{
            width:350px;
            padding:12px;
            margin-top:10px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        .login-form button:hover{
            background:#0056b3;
        }
        .cards{
            max-width:1200px;
            margin:50px auto;
            display:flex;
            flex-wrap:wrap;
            justify-content:space-between;
            gap:20px;
        }

        .card{
            width:calc(33.33% - 14px);
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 8px rgba(0,0,0,0.2);
            text-align:center;
        }

        .card h2{
            margin-bottom:10px;
        }

        .card p{
            color:#555;
        }

        @media (max-width:768px){

            body{
                background:gray;
            }

            .login-form{
                width:90%;
            }

            .login-form h1{
                font-size:24px;
            }

            .login-form input{
                width:100%;
            }

            .login-form button{
                width:100%;
            }

            .card{
                width:100%;
            }

        }

    </style>
</head>

<body>
    <div class="login-form">

        <h1>Login Form</h1>

        <input type="text" placeholder="Enter Username">

        <input type="password" placeholder="Enter Password">

        <button>Login</button>

    </div>

    <div class="cards">

        <div class="card">
            <h2>Card 1</h2>
            <p>HTML</p>
        </div>

        <div class="card">
            <h2>Card 2</h2>
            <p>CSS</p>
        </div>

        <div class="card">
            <h2>Card 3</h2>
            <p>JAVA SCRIPT</p>
        </div>

        <div class="card">
            <h2>Card 4</h2>
            <p>PYTHON</p>
        </div>

        <div class="card">
            <h2>Card 5</h2>
            <p>SQL</p>
        </div>

        <div class="card">
            <h2>Card 6</h2>
            <p>DEVOPS</p>
        </div>

    </div>

</body>
</html>
